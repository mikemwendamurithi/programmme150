<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CBE Student Database</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
}

body{
  background: linear-gradient(-45deg,#0f2027,#203a43,#2c5364);
  background-size:400% 400%;
  animation:bg 15s ease infinite;
  color:white;
  min-height:100vh;
}

@keyframes bg{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

header{
  text-align:center;
  padding:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
}

.container{
  max-width:1100px;
  margin:30px auto;
  padding:20px;
}

.search-box{
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  border-radius:12px;
  overflow:hidden;
}

th,td{
  padding:12px;
  text-align:left;
  border-bottom:1px solid rgba(255,255,255,0.1);
  font-size:14px;
}

th{
  background:rgba(0,198,255,0.3);
}

tr:hover{
  background:rgba(255,255,255,0.1);
}

.badge{
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
  display:inline-block;
  margin:2px;
}

.adm{background:#90be6d;color:black;}
.class{background:#8ecae6;color:black;}
.subject{background:#ffb703;color:black;}
</style>
</head>

<body>

<header>
<h1>🏫 CBE Student Database System</h1>
<p>Proper ERP Structured Data View</p>
</header>

<div class="container">

<div class="search-box">
<input type="text" id="search" onkeyup="filterTable()" placeholder="Search student by name or admission number...">
</div>

<table id="studentTable">
<thead>
<tr>
<th>Name</th>
<th>Admission</th>
<th>Class</th>
<th>Subjects</th>
</tr>
</thead>

<tbody id="tableBody">
<!-- DATA LOADS HERE -->
</tbody>

</table>

</div>

<script>
// 📊 DATABASE (like real ERP system)
const students = [
{ name:"James Mwangi", adm:"1001", class:"Grade 6", subjects:["Math","English","Kiswahili"] },
{ name:"Mary Wanjiku", adm:"1002", class:"Grade 5", subjects:["Science","English","Kiswahili"] },
{ name:"Brian Otieno", adm:"1003", class:"Grade 8", subjects:["ICT","Math","English","Kiswahili"] },
{ name:"Aisha Hassan", adm:"1004", class:"Grade 7", subjects:["English","Social Studies","Kiswahili"] },

{ name:"Kevin Kamau", adm:"1005", class:"Grade 6", subjects:["Math","English","Kiswahili"] },
{ name:"Sarah Njeri", adm:"1006", class:"Grade 5", subjects:["Science","English","Kiswahili"] },
{ name:"John Kiprotich", adm:"1007", class:"Grade 7", subjects:["ICT","English","Kiswahili"] },
{ name:"Faith Akinyi", adm:"1008", class:"Grade 4", subjects:["English","Kiswahili"] },
{ name:"David Ouma", adm:"1009", class:"Grade 8", subjects:["CRE","Science","English","Kiswahili"] },
{ name:"Grace Wambui", adm:"1010", class:"Grade 6", subjects:["Math","Kiswahili","English"] },

{ name:"Peter Mwangi", adm:"1011", class:"Grade 3", subjects:["Math","English","Kiswahili"] },
{ name:"Lydia Chebet", adm:"1012", class:"Grade 5", subjects:["Science","English","Kiswahili"] },
{ name:"Moses Kiptoo", adm:"1013", class:"Grade 7", subjects:["ICT","English","Kiswahili"] },
{ name:"Ann Wanjiru", adm:"1014", class:"Grade 2", subjects:["English","Kiswahili"] },
{ name:"Brian Kiplagat", adm:"1015", class:"Grade 9", subjects:["Math","ICT","English","Kiswahili"] },

{ name:"Sharon Atieno", adm:"1016", class:"Grade 6", subjects:["English","Kiswahili"] },
{ name:"Daniel Mutua", adm:"1017", class:"Grade 4", subjects:["Science","English","Kiswahili"] },
{ name:"Maryann Nduta", adm:"1018", class:"Grade 5", subjects:["Kiswahili","English"] },
{ name:"Isaac Mworia", adm:"1019", class:"Grade 8", subjects:["Math","English","Kiswahili"] },
{ name:"Joy Naliaka", adm:"1020", class:"Grade 7", subjects:["Social Studies","English","Kiswahili"] }
];

// 🧾 RENDER TABLE
function loadTable(){
  let tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  students.forEach(s=>{
    let row = `
      <tr>
        <td>${s.name}</td>
        <td><span class="badge adm">${s.adm}</span></td>
        <td><span class="badge class">${s.class}</span></td>
        <td>${s.subjects.map(sub=>`<span class="badge subject">${sub}</span>`).join(" ")}</td>
      </tr>
    `;
    tbody.innerHTML += row;
  });
}

loadTable();

// 🔍 SEARCH FUNCTION
function filterTable(){
  let input = document.getElementById("search").value.toLowerCase();
  let rows = document.querySelectorAll("#tableBody tr");

  rows.forEach(row=>{
    row.style.display = row.innerText.toLowerCase().includes(input)
      ? ""
      : "none";
  });
}
</script>

</body>
</html>
